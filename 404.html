<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>National Digital Asset Token Registry</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // This script takes the current url and converts the path into a query string
        // so that index.html can restore it.
        var l = window.location;
        var repoName = 'DigitalTokenWebApp';
        
        // Calculate the path relative to the repository root
        var path = l.pathname.split('/').slice(2).join('/');
        if (path && path[0] !== '/') path = '/' + path;
        
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            '/' + repoName + '/?path=' + encodeURIComponent(path) +
            l.search + l.hash
        );
    </script>
</head>
<body>
    Redirecting to National Digital Asset Token Registry...
</body>
</html>
